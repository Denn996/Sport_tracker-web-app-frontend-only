{% extends 'base.html' %}

{% block content %}
    <h1 style="border-bottom: 2px solid #eee; padding-bottom: 10px;">All Tracked Sports</h1>
    
    <ul style="list-style-type: none; padding: 0;">
        {% for item in items %}
            <li style="background: #f9f9f9; margin-bottom: 10px; padding: 15px; border-radius: 5px; border-left: 4px solid #3498db;">
                <a href="{% url 'sports_tracker:item_detail' item.id %}" style="text-decoration: none; color: #2c3e50; font-size: 1.2em; font-weight: bold;">
                    {{ item.name }}
                </a>
                <span style="float: right; color: #888; font-size: 0.9em;">
                    Added: {{ item.date_added|date:"M d, Y" }}
                </span>
            </li>
        {% empty %}
            <li style="padding: 15px; color: #777;">
                <em>No sports items are being tracked yet. Add some through the admin panel!</em>
            </li>
        {% endfor %}
    </ul>
{% endblock %}
