{% extends 'base.html' %}

{% block content %}
    <a href="{% url 'sports_tracker:item_list' %}" style="color: #3498db; text-decoration: none; font-size: 0.9em;">
        &larr; Back to List
    </a>

    <h1 style="margin-top: 15px;">{{ item.name }}</h1>
    
    <div style="background: #fdfdfd; padding: 20px; border: 1px solid #eee; border-radius: 5px; margin-top: 20px;">
        <p><strong>Description:</strong></p>
        <p style="line-height: 1.6; color: #444;">{{ item.description }}</p>
        
        <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
        
        <p style="font-size: 0.85em; color: #888; margin: 0;">
            Record created on: {{ item.date_added }}
        </p>
    </div>
{% endblock %}
